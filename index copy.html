<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sundial — Friends Across Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/three@0.128.0/build/three.min.js" onerror="window.__threeFailedToLoad = true;"></script>
<script src="https://unpkg.com/tz-lookup@6.1.25/tz.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  :root {
    --bg-deep: #0B0E1A;
    --bg-dawn: #1A1530;
    --text-warm: #F5F1E8;
    --text-dim: #9B97A8;
    --accent-day: #F2A65A;
    --accent-night: #5B5F97;
    --accent-now: #E8604C;
    --card-radius: 20px;
    --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg-deep);
    color: var(--text-warm);
    font-family: var(--font-main);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px calc(100px + env(safe-area-inset-bottom));
    min-height: 100vh;
  }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  header.top h1 {
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.02em;
  }

  header.top .add-btn {
    background: var(--accent-day);
    color: var(--bg-deep);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease;
  }
  header.top .add-btn:active { transform: scale(0.92); }

  .scrubber-wrap { margin-bottom: 8px; }
  .scrubber-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .scrubber-label .now-time { font-size: 20px; font-weight: 700; }
  .scrubber-label .reset-btn {
    background: none;
    border: 1px solid rgba(245,241,232,0.2);
    color: var(--text-dim);
    font-family: var(--font-main);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 100px;
    cursor: pointer;
  }
  .scrubber-label .reset-btn.active { color: var(--accent-now); border-color: var(--accent-now); }

  input[type="range"].time-slider {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(245,241,232,0.12);
    border-radius: 10px;
    outline: none;
  }
  input[type="range"].time-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent-now);
    box-shadow: 0 0 0 4px rgba(232,96,76,0.2);
    cursor: pointer;
  }
  input[type="range"].time-slider::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent-now); border: none;
    box-shadow: 0 0 0 4px rgba(232,96,76,0.2); cursor: pointer;
  }

  .hint { text-align: center; color: var(--text-dim); font-size: 12px; margin: 12px 0 24px; }

  .friend-strip {
    position: relative;
    border-radius: var(--card-radius);
    padding: 18px;
    margin-bottom: 14px;
    overflow: hidden;
    min-height: 92px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: background 0.4s ease;
    cursor: pointer;
  }
  .friend-strip .sky-arc {
    position: absolute; top: -40%; right: -10%;
    width: 160px; height: 160px; border-radius: 50%;
    opacity: 0.35; filter: blur(2px); pointer-events: none;
    transition: background 0.4s ease, opacity 0.4s ease;
  }
  .friend-strip .row-top { display: flex; align-items: center; gap: 12px; position: relative; z-index: 2; }
  .friend-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(245,241,232,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700;
    flex-shrink: 0; overflow: hidden;
    border: 2px solid rgba(245,241,232,0.25);
  }
  .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .friend-info { flex: 1; min-width: 0; }
  .friend-name { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
  .friend-meta { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; font-weight: 500; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.available { background: #6FCF97; }
  .status-dot.busy { background: #E8604C; }
  .friend-time { font-size: 25px; font-weight: 700; text-align: right; flex-shrink: 0; }
  .friend-time .ampm { font-size: 13px; font-weight: 500; opacity: 0.6; margin-left: 2px; }
  .row-bottom {
    position: relative; z-index: 2; display: flex; justify-content: space-between;
    align-items: center; font-size: 12px; color: var(--text-dim); margin-top: 8px; font-weight: 500;
  }
  .status-msg { font-style: italic; opacity: 0.85; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(11,14,26,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(245,241,232,0.08);
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    display: flex; justify-content: center; gap: 50px;
    z-index: 50;
  }
  .nav-btn {
    background: none; border: none; color: var(--text-dim);
    font-family: var(--font-main); font-size: 11px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; padding: 4px 8px;
  }
  .nav-btn.active { color: var(--accent-day); }
  .nav-btn .nav-icon { font-size: 19px; }

  .me-header { text-align: center; padding: 12px 0 28px; }
  .me-avatar-wrap { position: relative; display: inline-block; margin-bottom: 16px; }
  .me-avatar {
    width: 96px; height: 96px; border-radius: 50%;
    background: rgba(245,241,232,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; font-weight: 700;
    border: 3px solid var(--accent-day);
    overflow: hidden; cursor: pointer;
  }
  .me-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .me-avatar-edit {
    position: absolute; bottom: -2px; right: -2px;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent-day); color: var(--bg-deep);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; border: 2px solid var(--bg-deep); cursor: pointer;
  }
  .me-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .me-location { font-size: 13px; color: var(--text-dim); font-weight: 500; }

  .status-toggle-wrap {
    display: flex; background: rgba(245,241,232,0.06);
    border-radius: 14px; padding: 4px; margin-bottom: 24px;
  }
  .status-toggle-wrap button {
    flex: 1; background: none; border: none; color: var(--text-dim);
    font-family: var(--font-main); font-size: 14px; font-weight: 600;
    padding: 12px; border-radius: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .status-toggle-wrap button.active.available { background: #6FCF97; color: #0B2818; }
  .status-toggle-wrap button.active.busy { background: #E8604C; color: #2A0E08; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; color: var(--text-dim);
    margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .field input, .field select {
    width: 100%; background: rgba(245,241,232,0.08);
    border: 1px solid rgba(245,241,232,0.15); color: var(--text-warm);
    font-family: var(--font-main); font-size: 16px; font-weight: 500;
    padding: 12px 14px; border-radius: 12px; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent-day); }

  .qr-section { text-align: center; margin-top: 28px; padding-top: 24px; border-top: 1px solid rgba(245,241,232,0.1); }
  .qr-section h3 { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.04em; }
  #qr-canvas-wrap {
    display: inline-flex; justify-content: center; margin: 0 auto 12px;
    background: white; padding: 16px; border-radius: 16px;
  }
  .share-id { font-size: 13px; color: var(--text-dim); font-weight: 500; }
  .share-id strong { color: var(--text-warm); letter-spacing: 0.04em; font-weight: 700; }

  .btn-primary {
    width: 100%; background: var(--accent-day); color: var(--bg-deep);
    border: none; font-family: var(--font-main); font-size: 16px; font-weight: 700;
    padding: 14px; border-radius: 14px; cursor: pointer; margin-top: 8px;
  }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-secondary {
    width: 100%; background: none; border: 1px solid rgba(245,241,232,0.2);
    color: var(--text-warm); font-family: var(--font-main); font-size: 15px; font-weight: 600;
    padding: 12px; border-radius: 14px; cursor: pointer; margin-top: 10px;
  }

  #globeScreen .app { padding-top: 24px; padding-bottom: 100px; max-width: none; }
  .globe-header { max-width: 480px; margin: 0 auto 12px; padding: 0 20px; display: flex; justify-content: space-between; align-items: baseline; }
  .globe-header h1 { font-weight: 800; font-size: 26px; }
  .globe-header .utc-time { font-size: 13px; color: var(--text-dim); font-weight: 500; }
  #globeContainer { width: 100%; height: 60vh; touch-action: none; cursor: grab; }
  #globeContainer:active { cursor: grabbing; }
  .globe-legend {
    max-width: 480px; margin: 8px auto 0; padding: 0 20px;
    display: flex; gap: 16px; justify-content: center; font-size: 12px; color: var(--text-dim); font-weight: 500;
  }
  .globe-legend span { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .globe-friend-list { max-width: 480px; margin: 24px auto 0; padding: 0 20px; }
  .globe-friend-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid rgba(245,241,232,0.08);
  }
  .globe-friend-row .friend-avatar { width: 34px; height: 34px; font-size: 13px; }
  .globe-friend-row .fname { font-size: 14px; font-weight: 600; flex: 1; }
  .globe-friend-row .fcity { font-size: 12px; color: var(--text-dim); font-weight: 500; }

  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: flex-end; z-index: 100;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    background: var(--bg-dawn); width: 100%; max-width: 480px; margin: 0 auto;
    border-radius: 24px 24px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 85vh; overflow-y: auto;
  }
  .sheet h2 { font-size: 20px; font-weight: 800; margin-bottom: 18px; }

  .tab-switch { display: flex; background: rgba(245,241,232,0.06); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
  .tab-switch button {
    flex: 1; background: none; border: none; color: var(--text-dim);
    font-family: var(--font-main); font-size: 13px; font-weight: 600;
    padding: 10px; border-radius: 9px; cursor: pointer;
  }
  .tab-switch button.active { background: var(--accent-day); color: var(--bg-deep); }

  #scanner-video { width: 100%; border-radius: 16px; margin-bottom: 16px; background: #000; }
  .error-text { color: var(--accent-now); font-size: 13px; margin-top: 8px; display: none; font-weight: 500; }
  .error-text.show { display: block; }
</style>
</head>
<body>

<div class="screen active" id="friendsScreen">
  <div class="app">
    <header class="top">
      <h1>Sundial</h1>
      <button class="add-btn" id="openAddSheet">+</button>
    </header>

    <div class="scrubber-wrap">
      <div class="scrubber-label">
        <span class="now-time" id="scrubberTimeLabel">Now</span>
        <button class="reset-btn" id="resetScrubber">reset</button>
      </div>
      <input type="range" class="time-slider" id="timeSlider" min="-720" max="720" value="0" step="15">
    </div>
    <p class="hint">drag the slider to see everyone's sky shift through their day</p>

    <div id="friendList"></div>
  </div>
</div>

<div class="screen" id="globeScreen">
  <div class="app">
    <div class="globe-header">
      <h1>Globe</h1>
      <span class="utc-time" id="globeUtcTime">-- UTC</span>
    </div>
    <div id="globeContainer"></div>
    <div class="globe-legend">
      <span><span class="legend-dot" style="background:#F2A65A;"></span>daylight</span>
      <span><span class="legend-dot" style="background:#1A1A35;"></span>night</span>
    </div>
    <div class="globe-friend-list" id="globeFriendList"></div>
  </div>
</div>

<div class="screen" id="meScreen">
  <div class="app">
    <header class="top">
      <h1>Me</h1>
    </header>

    <div class="me-header">
      <div class="me-avatar-wrap">
        <div class="me-avatar" id="meAvatar">A</div>
        <div class="me-avatar-edit" id="meAvatarEdit">&#9998;</div>
      </div>
      <div class="me-name" id="meName">Your name</div>
      <div class="me-location" id="meLocation">Set your location below</div>
    </div>

    <div class="status-toggle-wrap">
      <button class="active available" id="statusAvailableBtn">
        <span class="status-dot available"></span> Available
      </button>
      <button id="statusBusyBtn">
        <span class="status-dot busy"></span> Busy
      </button>
    </div>

    <div class="field">
      <label>Status message</label>
      <input type="text" id="meStatusMsg" placeholder="e.g. Free after 6pm">
    </div>

    <div class="field">
      <label>Your name</label>
      <input type="text" id="meNameInput" placeholder="What friends will see">
    </div>

    <div class="field">
      <label>Your city</label>
      <input type="text" id="meCityInput" placeholder="e.g. Riyadh, Saudi Arabia">
      <p style="font-size:11px;color:var(--text-dim);margin-top:6px;">Location search by <a href="https://www.openstreetmap.org/copyright" target="_blank" style="color:var(--text-dim);">OpenStreetMap</a></p>
    </div>

    <button class="btn-primary" id="meSaveBtn">Save profile</button>
    <p id="meSaveStatus" style="text-align:center;font-size:13px;color:var(--text-dim);margin-top:10px;min-height:18px;"></p>

    <div class="qr-section">
      <h3>Your code</h3>
      <div id="qr-canvas-wrap"></div>
      <p class="share-id">ID: <strong id="meIdDisplay">&mdash;</strong></p>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" data-screen="friendsScreen">
    <span class="nav-icon">&#9680;</span> Friends
  </button>
  <button class="nav-btn" data-screen="globeScreen">
    <span class="nav-icon">&#127760;</span> Globe
  </button>
  <button class="nav-btn" data-screen="meScreen">
    <span class="nav-icon">&#9681;</span> Me
  </button>
</div>

<div class="sheet-overlay" id="addSheetOverlay">
  <div class="sheet">
    <h2>Add a friend</h2>
    <div class="tab-switch">
      <button class="active" id="tabScan">Scan QR</button>
      <button id="tabManual">Enter ID</button>
    </div>
    <div id="scanPane">
      <video id="scanner-video" autoplay playsinline muted></video>
      <p class="share-id" id="scanStatus">Point your camera at a friend's QR code</p>
    </div>
    <div id="manualPane" style="display:none;">
      <div class="field">
        <label>Friend's ID</label>
        <input type="text" id="manualIdInput" placeholder="e.g. d8cfebd136">
      </div>
      <button class="btn-primary" id="manualAddBtn">Add friend</button>
      <p class="error-text" id="manualError"></p>
    </div>
    <button class="btn-secondary" id="closeAddSheet">Cancel</button>
  </div>
</div>

<script>
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById(btn.dataset.screen).classList.add('active');
      if (btn.dataset.screen === 'globeScreen') initGlobeIfNeeded();
    });
  });

  // ===== API client — talks to the real deployed backend =====
  var API_BASE = 'https://sundial-backend.onrender.com';

  function apiCreateProfile(data) {
    return fetch(API_BASE + '/api/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(function(r) { return r.json().then(function(body) { return { ok: r.ok, body: body }; }); });
  }

  function apiUpdateProfile(id, data) {
    return fetch(API_BASE + '/api/profile/' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(function(r) { return r.json().then(function(body) { return { ok: r.ok, body: body }; }); });
  }

  function apiGetProfile(id) {
    return fetch(API_BASE + '/api/profile/' + encodeURIComponent(id))
      .then(function(r) { return r.json().then(function(body) { return { ok: r.ok, body: body }; }); });
  }

  function apiGetProfilesBatch(ids) {
    return fetch(API_BASE + '/api/profiles/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: ids })
    }).then(function(r) { return r.json().then(function(body) { return { ok: r.ok, body: body }; }); });
  }

  // ===== Local storage — each phone remembers its own identity + friend list =====
  function getMyProfileId() {
    return localStorage.getItem('sundial_my_id');
  }
  function setMyProfileId(id) {
    localStorage.setItem('sundial_my_id', id);
  }
  function getMyFriends() {
    try {
      return JSON.parse(localStorage.getItem('sundial_friends') || '[]');
    } catch (e) { return []; }
  }
  function setMyFriends(list) {
    localStorage.setItem('sundial_friends', JSON.stringify(list));
  }
  function addMyFriend(id, nickname) {
    var friends = getMyFriends();
    if (friends.some(function(f) { return f.id === id; })) return; // already added
    friends.push({ id: id, nickname: nickname || '' });
    setMyFriends(friends);
  }

  var myProfile = null;        // the real profile object fetched/created from the backend
  var realFriends = [];        // real friend profile objects, fetched by ID

  var offsetMinutes = 0;

  function adaptProfileForDisplay(p) {
    return {
      id: p.id,
      name: p.name,
      tz: p.timezone,
      status: p.status,
      msg: p.status_message || '',
      initial: (p.name || '?')[0].toUpperCase(),
      lat: p.latitude,
      lon: p.longitude,
      city: p.city_name || ''
    };
  }

  function getSkyGradient(hour) {
    if (hour >= 6 && hour < 8)   return ["#2D2A4A", "#E8946B"];
    if (hour >= 8 && hour < 17)  return ["#3D7FBF", "#8FC9E8"];
    if (hour >= 17 && hour < 19) return ["#3B2E5A", "#E8604C"];
    if (hour >= 19 && hour < 22) return ["#161330", "#3B2E6A"];
    return ["#0A0A1A", "#1A1A35"];
  }

  function renderFriends() {
    var list = document.getElementById('friendList');
    list.innerHTML = '';

    if (realFriends.length === 0) {
      list.innerHTML =
        '<div style="text-align:center;padding:50px 20px;color:#9B97A8;">' +
        '<div style="font-size:36px;margin-bottom:12px;">&#9680;</div>' +
        '<div style="font-size:16px;font-weight:700;color:#F5F1E8;margin-bottom:6px;">No friends yet</div>' +
        '<div style="font-size:13px;">Tap the + button above to add your first friend</div>' +
        '</div>';
      return;
    }

    var now = new Date(Date.now() + offsetMinutes * 60000);

    realFriends.forEach(function(f) {
      var localTime = new Intl.DateTimeFormat('en-US', {
        timeZone: f.tz, hour: 'numeric', minute: '2-digit', hour12: true
      }).formatToParts(now);
      var hourPart = new Intl.DateTimeFormat('en-US', {
        timeZone: f.tz, hour: 'numeric', hour12: false
      }).format(now);
      var hour = parseInt(hourPart, 10);
      var colors = getSkyGradient(hour);
      var c1 = colors[0], c2 = colors[1];

      var timeStr = '', ampm = '';
      localTime.forEach(function(p) {
        if (p.type === 'dayPeriod') ampm = p.value;
        else if (p.type !== 'literal' || p.value !== ' ') timeStr += p.value;
      });

      var strip = document.createElement('div');
      strip.className = 'friend-strip';
      strip.style.background = 'linear-gradient(135deg, ' + c1 + ', ' + c2 + ')';
      strip.innerHTML =
        '<div class="sky-arc" style="background: radial-gradient(circle, ' + c2 + ', transparent 70%);"></div>' +
        '<div class="row-top">' +
          '<div class="friend-avatar">' + f.initial + '</div>' +
          '<div class="friend-info">' +
            '<div class="friend-name">' + f.name + '</div>' +
            '<div class="friend-meta">' +
              '<span class="status-dot ' + f.status + '"></span>' +
              (f.status === 'available' ? 'Available' : 'Busy') +
            '</div>' +
          '</div>' +
          '<div class="friend-time">' + timeStr + '<span class="ampm">' + ampm + '</span></div>' +
        '</div>' +
        '<div class="row-bottom">' +
          '<span class="status-msg">' + (f.msg || '') + '</span>' +
          '<span>' + f.city + '</span>' +
        '</div>';
      list.appendChild(strip);
    });
  }

  function updateScrubberLabel() {
    var label = document.getElementById('scrubberTimeLabel');
    var resetBtn = document.getElementById('resetScrubber');
    if (offsetMinutes === 0) {
      label.textContent = 'Now';
      resetBtn.classList.remove('active');
    } else {
      var sign = offsetMinutes > 0 ? '+' : '';
      var hrs = (offsetMinutes / 60).toFixed(1).replace('.0', '');
      label.textContent = sign + hrs + 'h from now';
      resetBtn.classList.add('active');
    }
  }

  document.getElementById('timeSlider').addEventListener('input', function(e) {
    offsetMinutes = parseInt(e.target.value, 10);
    updateScrubberLabel();
    renderFriends();
  });
  document.getElementById('resetScrubber').addEventListener('click', function() {
    offsetMinutes = 0;
    document.getElementById('timeSlider').value = 0;
    updateScrubberLabel();
    renderFriends();
  });

  renderFriends();
  setInterval(function() { if (offsetMinutes === 0) renderFriends(); }, 30000);

  // ===== ADD FRIEND: shared logic for both scan + manual paths =====
  function tryAddFriendById(idOrUrl, onSuccess, onError) {
    var id = idOrUrl.trim();
    var match = id.match(/[?&]add=([^&]+)/);
    if (match) id = decodeURIComponent(match[1]);

    if (!id) { onError('Please enter an ID.'); return; }
    if (getMyFriends().some(function(f) { return f.id === id; })) {
      onError('Already in your friends list.');
      return;
    }
    if (myProfile && myProfile.id === id) {
      onError("That's your own ID.");
      return;
    }

    apiGetProfile(id).then(function(res) {
      if (!res.ok) { onError('No profile found with that ID.'); return; }
      addMyFriend(id, res.body.name);
      loadMyFriends();
      onSuccess(res.body);
    }).catch(function() {
      onError('Network error — please try again.');
    });
  }

  document.getElementById('manualAddBtn').addEventListener('click', function() {
    var input = document.getElementById('manualIdInput');
    var errEl = document.getElementById('manualError');
    errEl.classList.remove('show');

    tryAddFriendById(input.value, function(profile) {
      input.value = '';
      document.getElementById('addSheetOverlay').classList.remove('open');
    }, function(msg) {
      errEl.textContent = msg;
      errEl.classList.add('show');
    });
  });

  // ===== QR scanning via device camera + jsQR =====
  var scannerStream = null;
  var scannerRAF = null;
  var scannerCanvas = document.createElement('canvas');
  var scannerCtx = scannerCanvas.getContext('2d');

  function startScanner() {
    var video = document.getElementById('scanner-video');
    var statusEl = document.getElementById('scanStatus');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent = 'Camera not supported on this browser — use Enter ID instead.';
      return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(function(stream) {
        scannerStream = stream;
        video.srcObject = stream;
        statusEl.textContent = "Point your camera at a friend's QR code";
        scanLoop();
      })
      .catch(function() {
        statusEl.textContent = 'Camera access denied — use Enter ID instead.';
      });

    function scanLoop() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        scannerCanvas.width = video.videoWidth;
        scannerCanvas.height = video.videoHeight;
        scannerCtx.drawImage(video, 0, 0, scannerCanvas.width, scannerCanvas.height);
        var imageData = scannerCtx.getImageData(0, 0, scannerCanvas.width, scannerCanvas.height);
        var code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          statusEl.textContent = 'Found a code — adding friend…';
          stopScanner();
          tryAddFriendById(code.data, function(profile) {
            statusEl.textContent = 'Added ' + profile.name + '!';
            setTimeout(function() {
              document.getElementById('addSheetOverlay').classList.remove('open');
            }, 800);
          }, function(msg) {
            statusEl.textContent = msg;
            setTimeout(startScanner, 1500);
          });
          return;
        }
      }
      scannerRAF = requestAnimationFrame(scanLoop);
    }
  }

  function stopScanner() {
    if (scannerRAF) cancelAnimationFrame(scannerRAF);
    if (scannerStream) {
      scannerStream.getTracks().forEach(function(track) { track.stop(); });
      scannerStream = null;
    }
  }

  document.getElementById('openAddSheet').addEventListener('click', function() {
    document.getElementById('addSheetOverlay').classList.add('open');
    document.getElementById('manualError').classList.remove('show');
    if (document.getElementById('tabScan').classList.contains('active')) {
      startScanner();
    }
  });
  document.getElementById('closeAddSheet').addEventListener('click', function() {
    document.getElementById('addSheetOverlay').classList.remove('open');
    stopScanner();
  });
  document.getElementById('tabScan').addEventListener('click', function() {
    document.getElementById('tabScan').classList.add('active');
    document.getElementById('tabManual').classList.remove('active');
    document.getElementById('scanPane').style.display = 'block';
    document.getElementById('manualPane').style.display = 'none';
    startScanner();
  });
  document.getElementById('tabManual').addEventListener('click', function() {
    document.getElementById('tabManual').classList.add('active');
    document.getElementById('tabScan').classList.remove('active');
    document.getElementById('manualPane').style.display = 'block';
    document.getElementById('scanPane').style.display = 'none';
    stopScanner();
  });

  // ===== ME PAGE: real backend wiring =====
  var meSelectedStatus = 'available';

  document.getElementById('statusAvailableBtn').addEventListener('click', function() {
    meSelectedStatus = 'available';
    document.getElementById('statusAvailableBtn').classList.add('active');
    document.getElementById('statusBusyBtn').classList.remove('active');
  });
  document.getElementById('statusBusyBtn').addEventListener('click', function() {
    meSelectedStatus = 'busy';
    document.getElementById('statusBusyBtn').classList.add('active');
    document.getElementById('statusAvailableBtn').classList.remove('active');
  });

  function syncMeNamePreview() {
    var val = document.getElementById('meNameInput').value.trim();
    document.getElementById('meName').textContent = val || 'Your name';
    document.getElementById('meAvatar').textContent = val ? val[0].toUpperCase() : 'A';
  }
  document.getElementById('meNameInput').addEventListener('input', syncMeNamePreview);

  function syncMeCityPreview() {
    var val = document.getElementById('meCityInput').value.trim();
    document.getElementById('meLocation').textContent = val || 'Set your location below';
  }
  document.getElementById('meCityInput').addEventListener('input', syncMeCityPreview);

  // Geocode a typed city name to {lat, lon} using OpenStreetMap's free Nominatim service.
  // Usage policy: https://operations.osmfoundation.org/policies/nominatim/
  // Max 1 request/second, requires a custom User-Agent/Referer (browsers send Referer
  // automatically), and requires visible attribution — shown in the Me tab UI.
  function geocodeCity(cityText) {
    var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(cityText);
    return fetch(url).then(function(r) { return r.json(); }).then(function(results) {
      if (!results || results.length === 0) return null;
      return { lat: parseFloat(results[0].lat), lon: parseFloat(results[0].lon) };
    });
  }

  function setMeSaveStatus(text, isError) {
    var el = document.getElementById('meSaveStatus');
    if (!el) return;
    el.textContent = text;
    el.style.color = isError ? '#E8604C' : '#9B97A8';
  }

  document.getElementById('meSaveBtn').addEventListener('click', function() {
    var name = document.getElementById('meNameInput').value.trim();
    var cityText = document.getElementById('meCityInput').value.trim();
    var statusMsg = document.getElementById('meStatusMsg').value.trim();

    if (!name) {
      setMeSaveStatus('Please enter your name.', true);
      return;
    }
    if (!cityText) {
      setMeSaveStatus('Please enter your city.', true);
      return;
    }

    var btn = document.getElementById('meSaveBtn');
    btn.disabled = true;
    setMeSaveStatus('Looking up your city…', false);

    geocodeCity(cityText).then(function(coords) {
      if (!coords) {
        throw new Error('Could not find that city — try a different spelling, e.g. "Riyadh, Saudi Arabia".');
      }

      var timezone;
      try {
        timezone = tzlookup(coords.lat, coords.lon);
      } catch (e) {
        throw new Error('Could not determine timezone for that location.');
      }

      var payload = {
        name: name,
        timezone: timezone,
        latitude: coords.lat,
        longitude: coords.lon,
        city_name: cityText,
        status: meSelectedStatus,
        status_message: statusMsg
      };

      var existingId = getMyProfileId();
      if (existingId) {
        setMeSaveStatus('Saving…', false);
        return apiUpdateProfile(existingId, payload).then(function(res) {
          if (!res.ok) throw new Error(res.body.error || 'Failed to update profile.');
          myProfile = res.body;
          return myProfile;
        });
      } else {
        setMeSaveStatus('Creating your profile…', false);
        return apiCreateProfile(payload).then(function(res) {
          if (!res.ok) throw new Error(res.body.error || 'Failed to create profile.');
          myProfile = res.body;
          setMyProfileId(myProfile.id);
          return myProfile;
        });
      }
    }).then(function(profile) {
      setMeSaveStatus('Saved ✓', false);
      renderMyQrCode(profile.id);
      document.getElementById('meIdDisplay').textContent = profile.id;
    }).catch(function(err) {
      setMeSaveStatus(err.message || 'Something went wrong.', true);
    }).finally(function() {
      btn.disabled = false;
    });
  });

  function renderMyQrCode(profileId) {
    var url = window.location.origin + window.location.pathname + '?add=' + encodeURIComponent(profileId);
    var qrApiUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url);
    document.getElementById('qr-canvas-wrap').innerHTML =
      '<img src="' + qrApiUrl + '" width="160" height="160" alt="Your QR code" style="display:block;">';
  }

  function loadMyProfileIfExists() {
    var id = getMyProfileId();
    if (!id) {
      document.getElementById('qr-canvas-wrap').innerHTML =
        '<div style="width:160px;height:160px;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px;text-align:center;padding:10px;">QR generates after you save your profile</div>';
      return;
    }
    apiGetProfile(id).then(function(res) {
      if (!res.ok) return; // profile may have been wiped if backend DB was recreated
      myProfile = res.body;
      document.getElementById('meNameInput').value = myProfile.name || '';
      document.getElementById('meCityInput').value = myProfile.city_name || '';
      document.getElementById('meStatusMsg').value = myProfile.status_message || '';
      meSelectedStatus = myProfile.status || 'available';
      if (meSelectedStatus === 'busy') {
        document.getElementById('statusBusyBtn').click();
      }
      syncMeNamePreview();
      syncMeCityPreview();
      document.getElementById('meIdDisplay').textContent = myProfile.id;
      renderMyQrCode(myProfile.id);
    });
  }

  function loadMyFriends() {
    var friendEntries = getMyFriends();
    if (friendEntries.length === 0) {
      realFriends = [];
      renderFriends();
      if (globeInitialized) renderGlobeFriendList();
      return;
    }
    var ids = friendEntries.map(function(f) { return f.id; });
    apiGetProfilesBatch(ids).then(function(res) {
      if (!res.ok) return;
      realFriends = res.body.profiles
        .filter(function(p) { return p !== null; })
        .map(adaptProfileForDisplay);
      renderFriends();
      if (globeInitialized) renderGlobeFriendList();
    });
  }

  loadMyProfileIfExists();
  loadMyFriends();

  // ===== GLOBE: real Three.js implementation =====
  var globeInitialized = false;
  var globeScene, globeCamera, globeRenderer, globeSphere, globeGroup, pinGroup;
  var globeRotY = 0, globeRotX = 0.3;
  var isDragging = false, lastPointerX = 0, lastPointerY = 0;

  function solarPosition(date) {
    // Returns subsolar point {lat, lon} in degrees — the point on Earth directly under the sun.
    var msPerDay = 86400000;
    var dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / msPerDay);
    var declination = -23.45 * Math.cos((2 * Math.PI / 365) * (dayOfYear + 10));
    var utcHours = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
    var subsolarLon = (12 - utcHours) * 15;
    if (subsolarLon > 180) subsolarLon -= 360;
    if (subsolarLon < -180) subsolarLon += 360;
    return { lat: declination, lon: subsolarLon };
  }

  function latLonToVector3(lat, lon, radius) {
    var latRad = lat * Math.PI / 180;
    var lonRad = lon * Math.PI / 180;
    var x = radius * Math.cos(latRad) * Math.cos(lonRad);
    var y = radius * Math.sin(latRad);
    var z = -radius * Math.cos(latRad) * Math.sin(lonRad);
    return new THREE.Vector3(x, y, z);
  }

  function buildEarthTexture() {
    var canvas = document.createElement('canvas');
    canvas.width = 1024; canvas.height = 512;
    var ctx = canvas.getContext('2d');

    // Ocean base
    ctx.fillStyle = '#2D5C8A';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // DIAGNOSTIC: bold grid lines + text, so we can tell for certain if this texture is reaching the sphere
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 3;
    for (var gx = 0; gx <= canvas.width; gx += 128) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvas.height); ctx.stroke();
    }
    for (var gy = 0; gy <= canvas.height; gy += 128) {
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();
    }

    // Land
    ctx.fillStyle = '#5BA070';
    function blob(cx, cy, w, h, rot) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot || 0);
      ctx.beginPath();
      ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    blob(165, 140, 55, 80, 0.1);
    blob(210, 290, 35, 75, -0.1);
    blob(490, 115, 80, 55, 0);
    blob(650, 140, 110, 70, 0);
    blob(500, 240, 45, 70, 0.05);
    blob(775, 310, 55, 35, 0);
    blob(875, 100, 65, 40, 0);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 60px sans-serif';
    ctx.fillText('TEXTURE TEST', 300, 256);

    var texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
  }

  function initGlobeIfNeeded() {
    if (globeInitialized) return;

    var container = document.getElementById('globeContainer');

    try {
      if (typeof THREE === 'undefined' || window.__threeFailedToLoad) {
        throw new Error('Three.js failed to load (check internet connection, then retry)');
      }

      globeInitialized = true;
      container.innerHTML = '';

      var width = container.clientWidth || container.offsetWidth || window.innerWidth;
      var height = container.clientHeight || container.offsetHeight || Math.round(window.innerHeight * 0.6);

      if (!width || !height) {
        width = 360; height = 360; // last-resort fallback so renderer never gets 0x0
      }

      globeScene = new THREE.Scene();
      globeCamera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
      globeCamera.position.z = 2.6;

      globeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      globeRenderer.setSize(width, height);
      globeRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      container.appendChild(globeRenderer.domElement);

      globeGroup = new THREE.Group();
      globeScene.add(globeGroup);

      var geometry = new THREE.SphereGeometry(1, 64, 64);
      var material = new THREE.MeshPhongMaterial({
        color: 0x223355, // visible placeholder color while the real texture loads
        shininess: 5
      });
      globeSphere = new THREE.Mesh(geometry, material);
      globeGroup.add(globeSphere);

      var textureLoader = new THREE.TextureLoader();
      var earthTextureUrl = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';
      textureLoader.load(
        earthTextureUrl,
        function (loadedTexture) {
          material.map = loadedTexture;
          material.color.set(0xffffff);
          material.needsUpdate = true;
        },
        undefined,
        function () {
          // Real texture failed to load (e.g. offline) — fall back to procedural continents
          material.map = buildEarthTexture();
          material.color.set(0xffffff);
          material.needsUpdate = true;
        }
      );

      var ambient = new THREE.AmbientLight(0x8899bb, 1.8);
      globeScene.add(ambient);

      var sunLight = new THREE.DirectionalLight(0xfff2d8, 1.2);
      globeScene.add(sunLight);
      globeGroup.userData.sunLight = sunLight;

      pinGroup = new THREE.Group();
      globeGroup.add(pinGroup);

      function buildAvatarTexture(initial, bgColorHex) {
        var size = 128;
        var canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        var ctx = canvas.getContext('2d');

        // Circular clipped background
        ctx.beginPath();
        ctx.arc(size / 2, size / 2, size / 2 - 4, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fillStyle = '#' + bgColorHex.toString(16).padStart(6, '0');
        ctx.fill();

        // White ring border
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#F5F1E8';
        ctx.stroke();

        // Initial letter
        ctx.fillStyle = '#F5F1E8';
        ctx.font = 'bold 56px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(initial.toUpperCase(), size / 2, size / 2 + 4);

        var tex = new THREE.CanvasTexture(canvas);
        tex.needsUpdate = true;
        return tex;
      }

      function addPin(lat, lon, color, initial, photoUrl) {
        var pos = latLonToVector3(lat, lon, 1.02);
        var pinGeo = new THREE.SphereGeometry(0.022, 12, 12);
        var pinMat = new THREE.MeshBasicMaterial({ color: color });
        var pin = new THREE.Mesh(pinGeo, pinMat);
        pin.position.copy(pos);
        pinGroup.add(pin);

        var glowGeo = new THREE.SphereGeometry(0.04, 12, 12);
        var glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.3 });
        var glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.copy(pos);
        pinGroup.add(glow);

        // Floating circular avatar "billboard" above the pin — always faces the camera.
        var avatarPos = latLonToVector3(lat, lon, 1.16);

        function placeSprite(texture) {
          var spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: true, depthWrite: false, transparent: true });
          var sprite = new THREE.Sprite(spriteMat);
          sprite.position.copy(avatarPos);
          sprite.scale.set(0.14, 0.14, 1);
          pinGroup.add(sprite);

          // Thin connecting line from pin up to the avatar, for visual grouping
          var lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.5 });
          var lineGeo = new THREE.BufferGeometry().setFromPoints([pos, avatarPos]);
          var line = new THREE.Line(lineGeo, lineMat);
          pinGroup.add(line);
        }

        if (photoUrl) {
          new THREE.TextureLoader().load(
            photoUrl,
            function (tex) { placeSprite(tex); },
            undefined,
            function () { placeSprite(buildAvatarTexture(initial, color)); } // photo failed, fall back to initial
          );
        } else {
          placeSprite(buildAvatarTexture(initial, color));
        }
      }

      realFriends.forEach(function(f) {
        if (typeof f.lat !== 'number' || typeof f.lon !== 'number') return; // friend hasn't set a location yet
        var color = f.status === 'available' ? 0x6FCF97 : 0xE8604C;
        addPin(f.lat, f.lon, color, f.initial, null);
      });

      function updateSunPosition() {
        var sp = solarPosition(new Date());
        var sunPos = latLonToVector3(sp.lat, sp.lon, 5);
        globeGroup.userData.sunLight.position.copy(sunPos);
        var utcLabel = document.getElementById('globeUtcTime');
        if (utcLabel) {
          var d = new Date();
          var hh = String(d.getUTCHours()).padStart(2, '0');
          var mm = String(d.getUTCMinutes()).padStart(2, '0');
          utcLabel.textContent = hh + ':' + mm + ' UTC';
        }
      }
      updateSunPosition();
      setInterval(updateSunPosition, 60000);

      function render() {
        globeGroup.rotation.y = globeRotY;
        globeGroup.rotation.x = globeRotX;
        globeRenderer.render(globeScene, globeCamera);
        requestAnimationFrame(render);
      }
      render();

      function onPointerDown(x, y) {
        isDragging = true;
        lastPointerX = x;
        lastPointerY = y;
      }
      function onPointerMove(x, y) {
        if (!isDragging) return;
        var dx = x - lastPointerX;
        var dy = y - lastPointerY;
        globeRotY += dx * 0.005;
        globeRotX += dy * 0.005;
        globeRotX = Math.max(-1.2, Math.min(1.2, globeRotX));
        lastPointerX = x;
        lastPointerY = y;
      }
      function onPointerUp() { isDragging = false; }

      container.addEventListener('mousedown', function(e) { onPointerDown(e.clientX, e.clientY); });
      window.addEventListener('mousemove', function(e) { onPointerMove(e.clientX, e.clientY); });
      window.addEventListener('mouseup', onPointerUp);
      container.addEventListener('touchstart', function(e) {
        onPointerDown(e.touches[0].clientX, e.touches[0].clientY);
      });
      container.addEventListener('touchmove', function(e) {
        e.preventDefault();
        onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });
      container.addEventListener('touchend', onPointerUp);

      window.addEventListener('resize', function() {
        var w = container.clientWidth || width;
        var h = container.clientHeight || height;
        globeCamera.aspect = w / h;
        globeCamera.updateProjectionMatrix();
        globeRenderer.setSize(w, h);
      });

      renderGlobeFriendList();

    } catch (err) {
      globeInitialized = false; // allow retry if user switches tabs again
      container.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#E8604C;font-size:13px;text-align:center;padding:20px;gap:10px;">' +
        '<strong>Globe failed to load</strong>' +
        '<span style="color:#9B97A8;">' + (err && err.message ? err.message : 'Unknown error') + '</span>' +
        '<button onclick="initGlobeIfNeeded()" style="background:#F2A65A;color:#0B0E1A;border:none;padding:8px 16px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;">Retry</button>' +
        '</div>';
      console.error('Globe init error:', err);
    }
  }

  function renderGlobeFriendList() {
    var list = document.getElementById('globeFriendList');
    list.innerHTML = '';
    realFriends.forEach(function(f) {
      var row = document.createElement('div');
      row.className = 'globe-friend-row';
      row.innerHTML =
        '<div class="friend-avatar">' + f.initial + '</div>' +
        '<div class="fname">' + f.name + '</div>' +
        '<span class="status-dot ' + f.status + '"></span>' +
        '<div class="fcity">' + (f.city || '') + '</div>';
      list.appendChild(row);
    });
  }
</script>
